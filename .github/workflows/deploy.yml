name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # 尝试加载环境变量，确保 npm 和 pm2 命令在非交互式 SSH 中可用
            if [ -f ~/.bashrc ]; then source ~/.bashrc; fi
            if [ -f ~/.bash_profile ]; then source ~/.bash_profile; fi
            if [ -f ~/.nvm/nvm.sh ]; then source ~/.nvm/nvm.sh; fi
            
            # 使用 GitHub Secrets 中配置的部署路径
            mkdir -p ${{ secrets.PROJECT_PATH }}
            cd ${{ secrets.PROJECT_PATH }}
            
            # 判断是否已经是 git 仓库，如果不是则初始化克隆
            if [ ! -d ".git" ]; then
              echo "仓库不存在，正在初始化..."
              git init
              git remote add origin https://github.com/${{ github.repository }}
              git fetch origin main
              git reset --hard origin/main
              git branch -M main
            else
              echo "拉取最新代码..."
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # 写入或更新运行端口环境变量
            touch .env
            sed -i '/^PORT=/d' .env
            echo "PORT=${{ secrets.APP_PORT }}" >> .env
            
            if [ -n "${{ secrets.DATABASE_URL }}" ]; then
              sed -i '/^DATABASE_URL=/d' .env
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
            fi
            
            if [ -n "${{ secrets.JWT_SECRET }}" ]; then
              sed -i '/^JWT_SECRET=/d' .env
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            fi
            
            # 安装依赖
            npm install
            
            # 编译项目
            npm run build
            
            # 检查 pm2 是否可用，如果没有则尝试全局安装
            export PATH=$PATH:~/.npm-global/bin:/usr/local/bin:/opt/node/bin
            if ! command -v pm2 &> /dev/null; then
              echo "pm2 未找到，正在尝试安装..."
              npm install -g pm2
            fi
            
            # 重启服务 (附带 --update-env 读取最新的 .env)
            pm2 reload "${{ secrets.APP_NAME }}" --update-env || pm2 start dist/server.cjs --name "${{ secrets.APP_NAME }}" --update-env
            # 如果使用 systemd: sudo systemctl restart your-service
            # 如果是普通的 docker-compose: docker-compose up -d --build
